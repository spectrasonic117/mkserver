settings:
  allow-end: true
  warn-on-overload: false
  permissions-file: permissions.yml
  update-folder: update
  plugin-profiling: false
  connection-throttle: 4000
  query-plugins: true
  deprecated-verbose: default
  shutdown-message: Servidor Cerrado
  minimum-api: none
  use-map-color-cache: true
spawn-limits:
  monsters: 18
  animals: 7
  water-animals: 2
  water-ambient: 12
  water-underground-creature: 2
  axolotls: 2
  ambient: 7
chunk-gc:
  period-in-ticks: 400
ticks-per:
  animal-spawns: 1200
  monster-spawns: 4
  water-spawns: 1
  water-ambient-spawns: 1
  water-underground-creature-spawns: 1
  axolotl-spawns: 1
  ambient-spawns: 1
  autosave: 6000
aliases: now-in-commands.yml
